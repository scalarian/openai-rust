name: Bug report
description: Report a reproducible defect in the SDK, examples, or docs-backed workflows.
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Use this template for verified defects. Include a minimal reproduction and the exact surface you were using.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One sentence describing the bug.
      placeholder: `responses().create()` returns an unexpected serialization shape
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Crate version or commit SHA.
      placeholder: 0.1.0 or abc1234
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps, code sample, or fixture setup.
      placeholder: |
        1. Configure the client with ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Rust toolchain, OS, relevant feature flags, and any transport/runtime details.
      placeholder: rustc 1.85, macOS 15, `realtime` feature enabled
