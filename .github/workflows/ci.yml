name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run tests
        run: cargo test --workspace

      - name: Check documentation links
        run: docs/scripts/check_links.sh

      - name: Regenerate llms exports
        run: docs/scripts/generate_llms_exports.sh

      - name: Verify generated llms exports are committed
        run: git diff --exit-code -- docs/llms.txt docs/llms-full.txt

      - name: Package smoke test
        run: cargo package --workspace --allow-dirty --no-verify
